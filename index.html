<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taalhelden Master - Groep 6 & 7</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --primary-color: #4a90e2;
            --secondary-color: #2ecc71;
            --accent-color: #e74c3c;
            --warning-color: #f1c40f;
            --border-radius: 16px;
            --font-size: 16px;
        }

        [data-theme="dark"] {
            --bg-color: #1a252f;
            --card-bg: #2c3e50;
            --text-color: #ecf0f1;
            --primary-color: #3498db;
            --secondary-color: #27ae60;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Nunito', 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: var(--font-size);
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            padding: 25px;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--bg-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .user-stats { display: flex; gap: 10px; flex-wrap: wrap; }
        .stat-pill {
            background: var(--bg-color);
            padding: 8px 14px;
            border-radius: 30px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .level-select {
            padding: 8px 12px;
            border-radius: 8px;
            border: 2px solid var(--primary-color);
            font-weight: bold;
            background: var(--card-bg);
            color: var(--text-color);
            cursor: pointer;
        }

        .main-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .tile {
            background: var(--bg-color);
            border: 3px solid transparent;
            border-radius: var(--border-radius);
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .tile:hover {
            transform: translateY(-3px);
            border-color: var(--primary-color);
            background: var(--card-bg);
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
        }

        .tile-icon { font-size: 3rem; }
        .tile-title { font-size: 1.1rem; font-weight: bold; }

        .view-section { display: none; flex-direction: column; }
        .view-section.active { display: flex; }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { background: var(--primary-color); color: white; }
        .btn-secondary { background: var(--secondary-color); color: white; }
        .btn-danger { background: var(--accent-color); color: white; }
        .btn-warning { background: var(--warning-color); color: #2c3e50; }

        .exercise-box {
            background: var(--bg-color);
            padding: 20px;
            border-radius: var(--border-radius);
            margin-bottom: 20px;
            font-size: 1.15rem;
            line-height: 1.6;
        }

        .word-bubble-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        .word-bubble {
            padding: 10px 16px;
            background: var(--card-bg);
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.1s ease;
            color: var(--text-color);
        }

        .word-bubble.selected {
            background: var(--warning-color);
            border-color: #f39c12;
            color: #2c3e50;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin: 15px 0;
        }

        .option-btn {
            background: var(--card-bg);
            border: 2px solid var(--primary-color);
            padding: 15px;
            border-radius: 10px;
            font-size: 1.05rem;
            cursor: pointer;
            font-weight: bold;
            color: var(--text-color);
            text-align: left;
        }

        .option-btn.selected {
            background: var(--primary-color);
            color: white;
        }

        .input-text {
            width: 100%;
            padding: 12px;
            font-size: 1.1rem;
            border-radius: 8px;
            border: 2px solid var(--primary-color);
            margin: 15px 0;
            outline: none;
            background: var(--card-bg);
            color: var(--text-color);
        }

        .feedback-zone {
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            font-weight: bold;
            display: none;
        }

        .progress-bar {
            height: 12px;
            background: #e0e0e0;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-fill {
            height: 100%;
            background: var(--secondary-color);
            width: 0%;
            transition: width 0.3s ease;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .history-table th, .history-table td {
            border: 1px solid #bdc3c7;
            padding: 10px;
            text-align: left;
        }
        .history-table th { background: var(--bg-color); }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="user-stats">
                <div class="stat-pill">✨ <span id="stat-points">0</span> pt</div>
                <div class="stat-pill">🚀 Lvl <span id="stat-level">1</span></div>
                <div class="stat-pill"><span id="stat-medal">🥉 Brons</span></div>
                <div class="stat-pill">🔥 <span id="stat-streak">0</span> dagen</div>
            </div>
            <select id="level-selector" class="level-select">
                <option value="gr6">Groep 6</option>
                <option value="gr7">Groep 7</option>
            </select>
        </header>

        <!-- MAIN DASHBOARD -->
        <div id="dashboard-view" class="view-section active">
            <div class="main-grid">
                <div class="tile" data-mode="lezen"><div class="tile-icon">📖</div><div class="tile-title">Begrijpend Lezen</div></div>
                <div class="tile" data-mode="spelling"><div class="tile-icon">✏️</div><div class="tile-title">Spelling</div></div>
                <div class="tile" data-mode="dictee"><div class="tile-icon">🎤</div><div class="tile-title">Dictee</div></div>
                <div class="tile" data-mode="grammatica"><div class="tile-icon">📝</div><div class="tile-title">Grammatica</div></div>
                <div class="tile" data-mode="woordenschat"><div class="tile-icon">📚</div><div class="tile-title">Woordenschat</div></div>
                <div class="tile" data-mode="engels" id="engels-tile"><div class="tile-icon">🇬🇧</div><div class="tile-title">Engels</div></div>
                <div class="tile" data-mode="progress"><div class="tile-icon">📈</div><div class="tile-title">Voortgang</div></div>
                <div class="tile" data-mode="settings"><div class="tile-icon">⚙️</div><div class="tile-title">Instellingen</div></div>
            </div>
        </div>

        <!-- WORKSPACE -->
        <div id="workspace-view" class="view-section">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h2 id="workspace-title">Oefening</h2>
                <button class="btn btn-danger entry-back-btn">Stop ❌</button>
            </div>
            
            <div class="progress-bar"><div id="workspace-progress" class="progress-fill"></div></div>
            
            <div id="dynamic-content"></div>
            <div id="workspace-feedback" class="feedback-zone"></div>
            
            <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:15px;">
                <button id="btn-submit-answer" class="btn btn-primary">Controleer</button>
                <button id="btn-next-question" class="btn btn-warning" style="display:none;">Volgende ➡️</button>
            </div>
        </div>

        <!-- PROGRESS -->
        <div id="progress-view" class="view-section">
            <button class="btn btn-primary entry-back-btn">⬅️ Terug naar Dashboard</button>
            <h2 style="margin:20px 0 10px 0;">📊 Gemaakte Sessies</h2>
            <table class="history-table">
                <thead>
                    <tr>
                        <th>Datum</th>
                        <th>Onderdeel</th>
                        <th>Niveau</th>
                        <th>Score</th>
                    </tr>
                </thead>
                <tbody id="history-rows"></tbody>
            </table>
        </div>

        <!-- SETTINGS -->
        <div id="settings-view" class="view-section">
            <button class="btn btn-primary entry-back-btn">⬅️ Terug naar Dashboard</button>
            <h2 style="margin:20px 0 10px 0;">⚙️ Instellingen</h2>
            <div style="margin: 15px 0;">
                <label><strong>Thema:</strong></label>
                <select id="theme-select" class="level-select"><option value="light">Licht</option><option value="dark">Donker</option></select>
            </div>
            <div style="margin: 15px 0;">
                <label><strong>Spreeksnelheid:</strong></label>
                <input type="range" id="speech-rate" min="0.6" max="1.2" step="0.1" value="0.85">
            </div>
            <button id="btn-hard-reset" class="btn btn-danger" style="margin-top:20px;">Reset Score & Streak</button>
        </div>

    </div>

    <script>
        /**
         * UITGEBREIDE ONDERWIJS DATABASE (GESCHEIDEN PER NIVEAU)
         * Bevat unieke teksten, spellingkoppelingen en grammaticazinnen.
         */
        const EducationDatabase = {
            gr6: {
                spelling: [
                    {q: "Kies het correct gespelde woord:", o: ["pannenkoek", "pannekoek", "pannenkoeck"], c: "pannenkoek", u: "We schrijven een -n tussen pan en koek omdat pan een meervoud op -en heeft."},
                    {q: "Welk woord is goed geschreven?", o: ["krokodillen", "krokodilen", "crocodillen"], c: "krokodillen", u: "Korte klank /o/, dus daarna verdubbeling van de medeklinker l."},
                    {q: "Kies de juiste spelling van het woord:", o: ["bibliotheek", "bieblijoteek", "bibliotweek"], c: "bibliotheek", u: "Dit is een weetwoord met -th."},
                    {q: "Welke zin bevat GEEN spelfout?", o: ["Het eiland is erg groot.", "Hetijland is erg groot.", "Het eijland is erg groot."], c: "Het eiland is erg groot.", u: "Eiland schrijf je met een korte ei."},
                    {q: "Kies het juiste woord voor de lege plek: De chauffeur ... de bus.", o: ["bestuurt", "bestuurd", "besturd"], c: "bestuurt", u: "Tegenwoordige tijd van besturen (stam+t)."},

                    {q: "Wat is de juiste spelling?", o: ["vliegtuig", "vliegtuijg", "fliegtuig"], c: "vliegtuig", u: "Vliegtuig schrijf je met een v en een ui."},
                    {q: "Kies het correct gespelde woord:", o: ["koninkrijk", "koningrijk", "koninkreik"], c: "koninkrijk", u: "We schrijven -nk- en het achtervoegsel -rijk."},
                    {q: "Welk woord is correct?", o: ["politie", "poleetie", "policie"], c: "politie", u: "Dit is een politiewoord, je hoort /tsie/ maar schrijft -tie."},
                    {q: "Kies de juiste optie:", o: ["portemonnee", "portemonee", "portemonie"], c: "portemonnee", u: "Leenwoord uit het Frans, geschreven met dubbel n en dubbel e."},

                    {q: "Welk woord is goed geschreven?", o: ["kasteel", "casteel", "kasteil"], c: "kasteel", u: "Kasteel schrijf je met een k en lange ee."}
                ],
                dictee: [
                    "koninkrijk", "snelheid", "meisje", "verhuizen", "automatisch", 
                    "pannenkoek", "eiland", "vliegtuig", "bibliotheek", "kasteel", 
                    "politie", "chauffeur", "station", "vakantie", "portemonnee"
                ],
                lezen: [
                    {t: "De rode vos sluipt stilletjes door het hoge gras. Hij heeft zijn ogen gericht op een kleine muis die tussen de wortels van een oude eik zoekt naar eten.", q: "Wat probeert de vos te doen?", o: ["De muis vangen", "Spelen in het gras", "Slapen onder de eik"], c: "De muis vangen"},
                    {t: "Daan en Sophie bouwen een grote hut in het bos achter hun huis. Ze gebruiken stevige takken en droge bladeren om het dak waterdicht te maken.", q: "Waarvan maken ze het dak?", o: ["Takken en bladeren", "Plastik zeil", "Planken en spijkers"], c: "Takken en bladeren"},
                    {t: "Kasteel de Haar is het grootste kasteel van Nederland. Elk jaar komen er duizenden toeristen naartoe om de oude kamers en de prachtige tuinen te bekijken.", q: "Waarom komen de toeristen naar het kasteel?", o: ["Om de kamers en tuinen te zien", "Om er te gaan wonen", "Voor een groot popconcert"], c: "Om de kamers en tuinen te zien"},
                    {t: "De bibliotheek heeft deze week een actie: als je drie boeken leest, krijg je een mooie boekenlegger cadeau. Luuk heeft al twee boeken uit.", q: "Hoeveel boeken moet Luuk nog lezen voor het cadeau?", o: ["Nog één boek", "Nog twee boeken", "Nog drie boeken"], c: "Nog één boek"},

                    {t: "De brandweer moest gisteravond uitrukken voor een kat die hoog in een boom zat en er niet meer uit durfde. Met een lange ladder is het dier gered.", q: "Hoe heeft de brandweer de kat gered?", o: ["Met een lange ladder", "Door de boom om te zagen", "Met een groot vangnet"], c: "Met een lange ladder"},
                    {t: "Als je brood bakt, heb je meel, water, gist en een beetje zout nodig. Het gist zorgt ervoor dat het deeg lekker luchtig wordt en gaat rijzen.", q: "Wat zorgt ervoor dat het deeg gaat rijzen?", o: ["Het gist", "Het water", "Het zout"], c: "Het gist"},
                    {t: "Met een telescoop kun je sterren en planeten bekijken die heel ver weg staan. Vanaf de aarde lijken ze klein, maar in het echt zijn ze reusachtig.", q: "Hoe zien de sterren eruit door een telescoop ten opzichte van het blote oog?", o: ["Ze zijn veel beter en groter te bekijken", "Ze lijken nog kleiner", "Ze veranderen van kleur"], c: "Ze zijn veel beter en groter te bekijken"},
                    {t: "Lotte traint drie keer per week op de atletiekbaan. Haar grote droom is om volgend jaar mee te doen aan de regionale hardloopwedstrijd.", q: "Wat is de grote droom van Lotte?", o: ["Meedoen aan een hardloopwedstrijd", "Een nieuwe fiets kopen", "Trainer worden van een club"], c: "Meedoen aan een hardloopwedstrijd"},

                lezen: [
                    {t: "De overgang naar duurzame energie is wereldwijd in volle gang. Steeds meer huishoudens stappen over op zonnepanelen en windenergie om de uitstoot van schadelijke stoffen te verminderen.", q: "Wat is het doel van de overgang naar duurzame energie?", o: ["De uitstoot van schadelijke stoffen verminderen", "Het stroomnetwerk uitschakelen", "Meer windmolens in de tuin zetten"], c: "De uitstoot van schadelijke stoffen verminderen"},
                    {t: "Tijdens een archeologische opgraving in de binnenstad hebben onderzoekers resten gevonden van een middeleeuwse markthal. De vondst bewijst dat de stad honderden jaren geleden al een belangrijk handelscentrum was.", q: "Wat bewijst de archeologische vondst?", o: ["Dat de stad vroeger al een belangrijk handelscentrum was", "Dat er vroeger nooit markten waren", "Dat de stad pas net is opgebouwd"], c: "Dat de stad vroeger al een belangrijk handelscentrum was"},
                    {t: "Het menselijk brein verbruikt ongeveer twintig procent van alle energie die we via ons voedsel binnenkrijgen. Dit is opvallend veel, aangezien het brein slechts twee procent van ons totale lichaamsgewicht uitmaakt.", q: "Hoeveel procent van onze energie verbruikt het brein?", o: ["Twintig procent", "Twee procent", "Honderd procent"], c: "Twintig procent"},
                    {t: "De diepzee is een van de minst verkende plekken op onze planeet. Vanwege de extreme kou en de enorme waterdruk is het voor wetenschappers heel lastig om hier langdurig onderzoek te doen.", q: "Waarom is onderzoek in de diepzee zo lastig?", o: ["Vanwege de extreme kou en waterdruk", "Omdat er te veel grote vissen zwemmen", "Omdat het water daar te helder is"], c: "Vanwege de extreme kou en waterdruk"},
                    {t: "Planten maken hun eigen voedingsstoffen aan door middel van fotosynthese. Hierbij gebruiken ze zonlicht, water en koolstofdioxide om suikers en zuurstof te maken.", q: "Wat hebben planten onder andere nodig voor fotosynthese?", o: ["Zonlicht, water en koolstofdioxide", "Alleen een beetje zand", "Zuurstof en suikers uit de bodem"], c: "Zonlicht, water en koolstofdioxide"}
                ],
                grammatica: [
                    {z: "De ervaren schilder verft de buitenkant van het oude huis.", q: "Klik op de woorden die samen het **Lijdend Voorwerp** vormen:", multi: true, c: ["de", "buitenkant", "van", "het", "oude", "huis"]},
                    {z: "De dappere brandweerman bluste de gevaarlijke brand in de keuken.", q: "Klik op het **Lijdend Voorwerp** van de zin:", multi: true, c: ["de", "gevaarlijke", "brand"]},
                    {z: "De kapitein stuurt het enorme schip veilig de haven in.", q: "Klik op het **Lijdend Voorwerp**:", multi: true, c: ["het", "enorme", "schip"]},
                    {z: "De bakker bakt elke nacht honderden verse broodjes.", q: "Klik op het **Lijdend Voorwerp**:", multi: true, c: ["honderden", "verse", "broodjes"]},
                    {z: "De toeristen maken prachtige foto's van de oude toren.", q: "Klik op het **Lijdend Voorwerp**:", multi: true, c: ["prachtige", "foto's"]}
                ],
                woordenschat: [
                    {q: "Wat is de betekenis van 'monotoon'?", o: ["Gelijktijdig en saai", "Kleurrijk en vrolijk", "Heel luid"], c: "Gelijktijdig en saai"},
                    {q: "Wat betekent het spreekwoord 'Een open deur'?", o: ["Wat iedereen al weet", "Een kapot slot", "Een warm welkom"], c: "Wat iedereen al weet"},
                    {q: "Wat is een synoniem van 'accuraat'?", o: ["Nauwkeurig", "Slordig", "Snel"], c: "Nauwkeurig"},
                    {q: "Wat betekent 'legendarisch'?", o: ["Beroemd en legendarisch", "Onbekend", "Geheim"], c: "Beroemd en legendarisch"}
                ],
                engels: [
                    {q: "Vertaal: 'Ik heb twee broers'", o: ["I have two brothers", "I am two brothers", "I have two sisters"], c: "I have two brothers"},
                    {q: "Welke dag is 'Thursday'?", o: ["Donderdag", "Dinsdag", "Vrijdag"], c: "Donderdag"},
                    {q: "Wat betekent 'What time is it?'", o: ["Hoe laat is het?", "Welke dag is het?", "Waar ga je heen?"], c: "Hoe laat is het?"}
                ]
            }
        };

        /**
         * STATE MANAGEMENT
         */
        let appState = {
            points: 0,
            level: 1,
            streak: 0,
            history: [],
            settings: { theme: 'light', rate: 0.85 }
        };

        let currentSession = {
            mode: '',
            level: 'gr6',
            questions: [],
            currentIndex: 0,
            score: 0,
            selectedAnswers: []
        };

        // DOM Elements
        const mainDashboard = document.getElementById("dashboard-view");
        const workspaceView = document.getElementById("workspace-view");
        const progressView = document.getElementById("progress-view");
        const settingsView = document.getElementById("settings-view");
        const dynamicContent = document.getElementById("dynamic-content");
        const workspaceFeedback = document.getElementById("workspace-feedback");
        const btnSubmit = document.getElementById("btn-submit-answer");
        const btnNext = document.getElementById("btn-next-question");
        const levelSelector = document.getElementById("level-selector");

        document.addEventListener("DOMContentLoaded", () => {
            initStorage();
            setupGlobalEvents();
            syncUI();
        });

        function initStorage() {
            const saved = localStorage.getItem("taalapp_master_2026");
            if (saved) {
                try { appState = Object.assign(appState, JSON.parse(saved)); } catch(e) {}
            }
            document.getElementById("theme-select").value = appState.settings.theme;
            document.getElementById("speech-rate").value = appState.settings.rate;
            applyTheme();
        }

        function saveState() {
            localStorage.setItem("taalapp_master_2026", JSON.stringify(appState));
            syncUI();
        }

        function applyTheme() {
            document.documentElement.setAttribute("data-theme", appState.settings.theme);
        }

        function syncUI() {
            document.getElementById("stat-points").innerText = appState.points;
            appState.level = Math.floor(appState.points / 30) + 1;
            document.getElementById("stat-level").innerText = appState.level;
            
            let m = "🥉 Brons";
            if(appState.points > 150) m = "🏆 Meester";
            else if(appState.points > 90) m = "💎 Diamant";
            else if(appState.points > 50) m = "🥇 Goud";
            else if(appState.points > 20) m = "🥈 Zilver";
            document.getElementById("stat-medal").innerText = m;
            document.getElementById("stat-streak").innerText = appState.streak;
        }

        function setupGlobalEvents() {
            document.querySelectorAll(".tile").forEach(tile => {
                tile.addEventListener("click", () => {
                    const mode = tile.getAttribute("data-mode");
                    if(mode === "progress") {
                        showSection(progressView);
                        renderHistory();
                    } else if(mode === "settings") {
                        showSection(settingsView);
                    } else {
                        startSession(mode, levelSelector.value);
                    }
                });
            });

            document.querySelectorAll(".entry-back-btn").forEach(btn => {
                btn.addEventListener("click", () => {
                    window.speechSynthesis.cancel();
                    showSection(mainDashboard);
                });
            });

            document.getElementById("theme-select").addEventListener("change", (e) => {
                appState.settings.theme = e.target.value;
                applyTheme();
                saveState();
            });
            document.getElementById("speech-rate").addEventListener("change", (e) => {
                appState.settings.rate = parseFloat(e.target.value);
                saveState();
            });
            document.getElementById("btn-hard-reset").addEventListener("click", () => {
                if(confirm("Weet je zeker dat je je score wilt resetten?")) {
                    appState.points = 0;
                    appState.streak = 0;
                    appState.history = [];
                    saveState();
                }
            });

            btnSubmit.addEventListener("click", evaluateAnswer);
            btnNext.addEventListener("click", goToNextQuestion);
        }

        function showSection(section) {
            mainDashboard.style.display = "none";
            workspaceView.style.display = "none";
            progressView.style.display = "none";
            settingsView.style.display = "none";
            section.style.display = "flex";
        }

        function startSession(mode, level) {
            let dbSource = EducationDatabase[level][mode];
            
            if(!dbSource || dbSource.length === 0) {
                alert("Geen opdrachten beschikbaar voor dit niveau.");
                return;
            }

            // Kopieer de pool en shuffle deze
            let pool = [...dbSource];
            pool.sort(() => 0.5 - Math.random());
            
            // Garandeer ALTIJD exact 15 opdrachten (vul aan indien de pool kleiner is)
            let finalQuestions = [];
            while(finalQuestions.length < 15) {
                finalQuestions.push(...pool);
            }
            
            currentSession.mode = mode;
            currentSession.level = level;
            currentSession.questions = finalQuestions.slice(0, 15);
            currentSession.currentIndex = 0;
            currentSession.score = 0;

            document.getElementById("workspace-title").innerText = `${mode.toUpperCase()} (${level.toUpperCase()}) - Vraag 1/15`;
            showSection(workspaceView);
            loadQuestion();
        }

        function loadQuestion() {
            workspaceFeedback.style.display = "none";
            btnSubmit.style.display = "inline-flex";
            btnNext.style.display = "none";
            currentSession.selectedAnswers = [];

            const total = currentSession.questions.length;
            const current = currentSession.currentIndex;
            
            document.getElementById("workspace-progress").style.width = `${(current / total) * 100}%`;
            document.getElementById("workspace-title").innerText = `${currentSession.mode.toUpperCase()} - Vraag ${current + 1}/${total}`;

            if(current >= total) {
                finishSession();
                return;
            }

            const qData = currentSession.questions[current];
            dynamicContent.innerHTML = "";

            if(currentSession.mode === "dictee") {
                // qData is hier een puur string-woord
                dynamicContent.innerHTML = `
                    <div class="exercise-box" style="text-align:center;">
                        <button id="btn-dictee-audio" class="btn btn-warning" style="margin-bottom:15px; font-size:1.2rem;">🔊 Luister naar het woord</button>
                        <p>Typ het woord dat je hoort zorgvuldig over:</p>
                        <input type="text" id="dictee-raw-input" class="input-text" autocomplete="off" placeholder="Jouw antwoord...">
                    </div>
                `;
                
                const playAudio = () => {
                    window.speechSynthesis.cancel();
                    let msg = new SpeechSynthesisUtterance(`Schrijf op: ${qData}`);
                    msg.lang = "nl-NL";
                    msg.rate = appState.settings.rate;
                    window.speechSynthesis.speak(msg);
                };

                document.getElementById("btn-dictee-audio").addEventListener("click", playAudio);
                playAudio();

            } else if(currentSession.mode === "grammatica") {
                let woorden = qData.z.split(" ");
                let bubblesHtml = woorden.map((w, idx) => `<button class="word-bubble" data-idx="${idx}">${w}</button>`).join("");
                
                dynamicContent.innerHTML = `
                    <div class="exercise-box">
                        <p style="margin-bottom:15px; font-weight:bold;">${qData.q}</p>
                        <div class="word-bubble-container">${bubblesHtml}</div>
                    </div>
                `;

                document.querySelectorAll(".word-bubble").forEach(bubble => {
                    bubble.addEventListener("click", () => {
                        let idx = bubble.getAttribute("data-idx");
                        let woordSchoon = woorden[idx].replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");
                        if(qData.multi) {
                            bubble.classList.toggle("selected");
                            if(bubble.classList.contains("selected")) {
                                currentSession.selectedAnswers.push(woordSchoon);
                            } else {
                                currentSession.selectedAnswers = currentSession.selectedAnswers.filter(w => w !== woordSchoon);
                            }
                        } else {
                            document.querySelectorAll(".word-bubble").forEach(b => b.classList.remove("selected"));
                            bubble.classList.add("selected");
                            currentSession.selectedAnswers = [woordSchoon];
                        }
                    });
                });

            } else {
                // Spelling, Lezen, Woordenschat, Engels
                let textContainer = qData.t ? `<div class="exercise-box" style="margin-bottom:15px; text-align:left; background:#fff; border-left:5px solid var(--primary-color);">${qData.t}</div>` : '';
                
                // Shuffle opties zodat het juiste antwoord niet altijd bovenaan staat
                let shuffledOptions = [...qData.o].sort(() => 0.5 - Math.random());
                let optHtml = shuffledOptions.map(o => `<button class="option-btn">${o}</button>`).join("");

                dynamicContent.innerHTML = `
                    ${textContainer}
                    <div class="exercise-box">
                        <p style="margin-bottom:15px; font-weight:bold;">${qData.q}</p>
                        <div class="options-grid">${optHtml}</div>
                    </div>
                `;

                document.querySelectorAll(".option-btn").forEach(btn => {
                    btn.addEventListener("click", () => {
                        document.querySelectorAll(".option-btn").forEach(b => b.classList.remove("selected"));
                        btn.classList.add("selected");
                        currentSession.selectedAnswers = [btn.innerText];
                    });
                });
            }
        }

        function evaluateAnswer() {
            const qData = currentSession.questions[currentSession.currentIndex];
            let isCorrect = false;
            let correctFeedback = "";

            if (currentSession.mode === "dictee") {
                const userVal = document.getElementById("dictee-raw-input").value.trim().toLowerCase();
                isCorrect = (userVal === qData.toLowerCase());
                correctFeedback = `Het juiste antwoord is: **${qData}**`;
            } else if (currentSession.mode === "grammatica") {
                const cleanAnswers = currentSession.selectedAnswers.map(w => w.toLowerCase());
                const cleanCorrect = qData.c.map(w => w.toLowerCase());
                
                isCorrect = cleanCorrect.every(w => cleanAnswers.includes(w)) && cleanAnswers.length === cleanCorrect.length;
                correctFeedback = `Het juiste antwoord is: **${qData.c.join(" ")}**`;
            } else {
                isCorrect = (currentSession.selectedAnswers[0] === qData.c);
                correctFeedback = qData.u ? qData.u : `Het juiste antwoord is: **${qData.c}**`;
            }

            workspaceFeedback.style.display = "block";
            if (isCorrect) {
                workspaceFeedback.style.backgroundColor = "rgba(46, 204, 113, 0.2)";
                workspaceFeedback.style.color = "var(--secondary-color)";
                workspaceFeedback.innerHTML = `🎉 Goed gedaan! ${correctFeedback}`;
                currentSession.score++;
                appState.points += 10;
            } else {
                workspaceFeedback.style.backgroundColor = "rgba(231, 76, 60, 0.2)";
                workspaceFeedback.style.color = "var(--accent-color)";
                workspaceFeedback.innerHTML = `❌ Helaas! ${correctFeedback}`;
            }

            btnSubmit.style.display = "none";
            btnNext.style.display = "inline-flex";
        }

        function goToNextQuestion() {
            currentSession.currentIndex++;
            loadQuestion();
        }

        function finishSession() {
            appState.streak += 1;
            
            const newSessionRecord = {
                date: new Date().toLocaleDateString('nl-NL'),
                mode: currentSession.mode.toUpperCase(),
                level: currentSession.level.toUpperCase(),
                score: `${currentSession.score} / ${currentSession.questions.length}`
            };
            
            appState.history.push(newSessionRecord);
            saveState();

            dynamicContent.innerHTML = `
                <div class="exercise-box" style="text-align:center; padding:40px 20px;">
                    <h2 style="font-size:2rem; margin-bottom:15px;">🏆 Oefening Afgerond!</h2>
                    <p style="font-size:1.2rem; margin-bottom:25px;">
                        Je hebt een score van <strong>${currentSession.score} van de ${currentSession.questions.length}</strong> behaald.<br>
                        Je totale score is nu <strong>${appState.points} punten</strong>.
                    </p>
                    <button class="btn btn-secondary entry-back-btn" onclick="showSection(mainDashboard)">Terug naar Dashboard</button>
                </div>
            `;
            btnSubmit.style.display = "none";
            btnNext.style.display = "none";
        }

        function renderHistory() {
            const tbody = document.getElementById("history-rows");
            tbody.innerHTML = "";
            if(appState.history.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;">Nog geen sessies gemaakt.</td></tr>`;
                return;
            }
            appState.history.forEach(row => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>${row.date}</td>
                    <td>${row.mode}</td>
                    <td>${row.level}</td>
                    <td>${row.score}</td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
