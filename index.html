<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taalhelden Master - Groep 6 & 7</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --primary-color: #4a90e2;
            --secondary-color: #2ecc71;
            --accent-color: #e74c3c;
            --warning-color: #f1c40f;
            --border-radius: 16px;
            --font-size: 16px;
        }

        [data-theme="dark"] {
            --bg-color: #1a252f;
            --card-bg: #2c3e50;
            --text-color: #ecf0f1;
            --primary-color: #3498db;
            --secondary-color: #27ae60;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Nunito', 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: var(--font-size);
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            padding: 25px;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--bg-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .user-stats { display: flex; gap: 10px; flex-wrap: wrap; }
        .stat-pill {
            background: var(--bg-color);
            padding: 8px 14px;
            border-radius: 30px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .level-select {
            padding: 8px 12px;
            border-radius: 8px;
            border: 2px solid var(--primary-color);
            font-weight: bold;
            background: var(--card-bg);
            color: var(--text-color);
            cursor: pointer;
        }

        .main-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .tile {
            background: var(--bg-color);
            border: 3px solid transparent;
            border-radius: var(--border-radius);
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .tile:hover {
            transform: translateY(-3px);
            border-color: var(--primary-color);
            background: var(--card-bg);
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
        }

        .tile-icon { font-size: 3rem; }
        .tile-title { font-size: 1.1rem; font-weight: bold; }

        .view-section { display: none; flex-direction: column; }
        .view-section.active { display: flex; }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { background: var(--primary-color); color: white; }
        .btn-secondary { background: var(--secondary-color); color: white; }
        .btn-danger { background: var(--accent-color); color: white; }
        .btn-warning { background: var(--warning-color); color: #2c3e50; }

        .exercise-box {
            background: var(--bg-color);
            padding: 20px;
            border-radius: var(--border-radius);
            margin-bottom: 20px;
            font-size: 1.15rem;
            line-height: 1.6;
        }

        .word-bubble-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        .word-bubble {
            padding: 10px 16px;
            background: var(--card-bg);
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.1s ease;
            color: var(--text-color);
        }

        .word-bubble.selected {
            background: var(--warning-color);
            border-color: #f39c12;
            color: #2c3e50;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 15px 0;
        }

        .option-btn {
            background: var(--card-bg);
            border: 2px solid var(--primary-color);
            padding: 15px;
            border-radius: 10px;
            font-size: 1.05rem;
            cursor: pointer;
            font-weight: bold;
            color: var(--text-color);
            text-align: left;
        }

        .option-btn.selected {
            background: var(--primary-color);
            color: white;
        }

        .input-text {
            width: 100%;
            padding: 12px;
            font-size: 1.1rem;
            border-radius: 8px;
            border: 2px solid var(--primary-color);
            margin: 15px 0;
            outline: none;
            background: var(--card-bg);
            color: var(--text-color);
        }

        .feedback-zone {
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            font-weight: bold;
            display: none;
        }

        .progress-bar {
            height: 12px;
            background: #e0e0e0;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-fill {
            height: 100%;
            background: var(--secondary-color);
            width: 0%;
            transition: width 0.3s ease;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .history-table th, .history-table td {
            border: 1px solid #bdc3c7;
            padding: 10px;
            text-align: left;
        }
        .history-table th { background: var(--bg-color); }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="user-stats">

                <div class="stat-pill">🚀 Lvl <span id="stat-level">1</span></div>

                <div class="stat-pill">🔥 <span id="stat-streak">0</span> dagen</div>
            </div>
            <select id="level-selector" class="level-select">
                <option value="b6">Begin Groep 6</option>
                <option value="m6">Midden Groep 6</option>
                <option value="b7">Begin Groep 7</option>
                <option value="m7">Midden Groep 7</option>
            </select>
        </header>

        <!-- MAIN DASHBOARD -->
        <div id="dashboard-view" class="view-section active">
            <div class="main-grid">
                <div class="tile" data-mode="lezen"><div class="tile-icon">📖</div><div class="tile-title">Begrijpend Lezen</div></div>
                <div class="tile" data-mode="spelling"><div class="tile-icon">✏️</div><div class="tile-title">Spelling</div></div>
                <div class="tile" data-mode="dictee"><div class="tile-icon">🎤</div><div class="tile-title">Dictee</div></div>
                <div class="tile" data-mode="grammatica"><div class="tile-icon">📝</div><div class="tile-title">Grammatica</div></div>
                <div class="tile" data-mode="woordenschat"><div class="tile-icon">📚</div><div class="tile-title">Woordenschat</div></div>
                <div class="tile" data-mode="engels" id="engels-tile"><div class="tile-icon">🇬🇧</div><div class="tile-title">Engels (Gr. 7)</div></div>
                <div class="tile" data-mode="progress"><div class="tile-icon">📈</div><div class="tile-title">Voortgang</div></div>
                <div class="tile" data-mode="settings"><div class="tile-icon">⚙️</div><div class="tile-title">Instellingen</div></div>
            </div>
        </div>

        <!-- GENERIEKE WERKOMGEVING VOOR VRAGEN -->
        <div id="workspace-view" class="view-section">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h2 id="workspace-title">Oefening</h2>
                <button class="btn btn-danger entry-back-btn">Stop ❌</button>
            </div>
            
            <div class="progress-bar"><div id="workspace-progress" class="progress-fill"></div></div>
            
            <div id="dynamic-content"></div>
            <div id="workspace-feedback" class="feedback-zone"></div>
            
            <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:15px;">
                <button id="btn-submit-answer" class="btn btn-primary">Controleer</button>
                <button id="btn-next-question" class="btn btn-warning" style="display:none;">Volgende ➡️</button>
            </div>
        </div>

        <!-- VOORTGANG -->
        <div id="progress-view" class="view-section">
            <button class="btn btn-primary entry-back-btn">⬅️ Terug naar Dashboard</button>
            <h2 style="margin:20px 0 10px 0;">📊 Gemaakte Sessies</h2>
            <table class="history-table">
                <thead>
                    <tr>
                        <th>Datum</th>
                        <th>Onderdeel</th>
                        <th>Niveau</th>
                        <th>Score</th>
                    </tr>
                </thead>
                <tbody id="history-rows"></tbody>
            </table>
        </div>

        <!-- INSTELLINGEN -->
        <div id="settings-view" class="view-section">
            <button class="btn btn-primary entry-back-btn">⬅️ Terug naar Dashboard</button>
            <h2 style="margin:20px 0 10px 0;">⚙️ Instellingen</h2>
            <div style="margin: 15px 0;">
                <label><strong>Thema:</strong></label>
                <select id="theme-select" class="level-select"><option value="light">Licht</option><option value="dark">Donker</option></select>
            </div>
            <div style="margin: 15px 0;">
                <label><strong>Spreeksnelheid:</strong></label>
                <input type="range" id="speech-rate" min="0.6" max="1.2" step="0.1" value="0.85">
            </div>
            <button id="btn-hard-reset" class="btn btn-danger" style="margin-top:20px;">Reset Score & Streak</button>
        </div>

    </div>

            {z: "De tandarts controleert mijn gebit twee keer per jaar.", ow: ["De", "tandarts"], pv: ["controleert"], lv: ["mijn", "gebit"]},
            {z: "De speler scoort een prachtig doelpunt in de kruising.", ow: ["De", "speler"], pv: ["scoort"], lv: ["een", "prachtig", "doelpunt"]},
            {z: "Het grote publiek applaudisseerde wild voor de jonge turnster.", ow: ["Het", "grote", "publiek"], pv: ["applaudisseerde"], lv: []},
            {z: "De kapper knipt mijn haren lekker kort voor de zomer.", ow: ["De", "kapper"], pv: ["knipt"], lv: ["mijn", "haren"]},
            {z: "De detective lost de mysterieuze diefstal binnen een dag op.", ow: ["De", "detective"], pv: ["lost"], lv: ["de", "mysterieuze", "diefstal"]}
        ];

        // Generatorfuncties om oneindig variaties op te werpen gebaseerd op de 450+ basisbronnen
        const DynamicGenerator = {
            getSpelling: (level) => {
                let list = [];
                for(let i=0; i<30; i++) {
                    let w = MasterWordPool[Math.floor(Math.random() * MasterWordPool.length)];
                    list.push({
                        q: `Wat is de juiste spelling van het woord dat hoort bij de klank /${w}/?`,
                        o: [w, w + "s", w.replace("ee", "e").replace("oo", "o")],
                        c: w,
                        u: `Dit betreft een reguliere vorming conform de spellingregels van groep 6/7.`
                    });
                }
                return list;
            },
            getDictee: (level) => {
                let list = [];
                for(let i=0; i<30; i++) {
                    let w = MasterWordPool[Math.floor(Math.random() * MasterWordPool.length)];
                    list.push({
                        w: w,
                        z: `Schrijf het woord op: ${w}.`
                    });
                }
                return list;
            },
            getGrammatica: (level) => {
                let list = [];
                MasterSentencePool.forEach(item => {
                    let type = Math.random() > 0.5 ? "ow" : "pv";
                    list.push({
                        z: item.z,
                        type: type,
                        q: type === "ow" ? "Klik op de woorden die samen het **Onderwerp (wie/wat + pv)** vormen:" : "Klik op de **Persoonsvorm (maak de zin vragend)**:",
                        multi: type === "ow",
                        c: type === "ow" ? item.ow : item.pv
                    });
                });
                return list;
            },
            getWoordenschat: (level) => {
                return [
                    {q: "Wat is de tegenstelling van 'gierig'?", o: ["vrijgevig", "arm", "rijk"], c: "vrijgevig"},
                    {q: "Wat betekent 'ambitieus'?", o: ["Succes willen behalen", "Altijd moe zijn", "Geen mening hebben"], c: "Succes willen behalen"},
                    {q: "Wat betekent het spreekwoord: 'De kat uit de boom kijken'?", o: ["Een afwachtende houding aannemen", "Snel handelen", "Klimmen"], c: "Een afwachtende houding aannemen"},
                    {q: "Wat is een synoniem van 'vervaardigen'?", o: ["Maken", "Slopen", "Kopen"], c: "Maken"},
                    {q: "Wat betekent 'rigoureus'?", o: ["Ingrijpend en grondig", "Voorzichtig", "Langzaam"], c: "Ingrijpend en grondig"},
                    {q: "Wat is de tegenstelling van 'optredend'?", o: ["Terugtrekkend", "Verschijnend", "Zichtbaar"], c: "Terugtrekkend"},
                    {q: "Wat betekent 'monotoon'?", o: ["Gelijktijdig en saai", "Kleurrijk", "Heel luid"], c: "Gelijktijdig en saai"},
                    {q: "Wat betekent het spreekwoord 'Een open deur'?", o: ["Wat iedereen al weet", "Een kapot slot", "Een warm welkom"], c: "Wat iedereen al weet"},
                    {q: "Wat is een synoniem van 'accuraat'?", o: ["Nauwkeurig", "Slordig", "Snel"], c: "Nauwkeurig"},
                    {q: "Wat betekent 'legendarisch'?", o: ["Beroemd en legendarisch", "Onbekend", "Geheim"], c: "Beroemd en legendarisch"}
                ];
            },
            getLezen: (level) => {
                let list = [];
                MasterSentencePool.forEach((item, idx) => {
                    if (idx < 20) {
                        list.push({
                            t: item.z + " Dit gebeurt elke dag trouw in de vroege ochtenduren.",
                            q: "Wat kun je concluderen op basis van de tekst?",
                            o: ["Het is een dagelijkse gebeurtenis", "Het gebeurt alleen in het weekend", "Niemand weet wanneer het gebeurt"],
                            c: "Het is een dagelijkse gebeurtenis"
                        });
                    }
                });
                return list;
            },
            getEngels: (level) => {
                return [
                    {q: "Vertaal: 'Ik heb twee broers'", o: ["I have two brothers", "I am two brothers", "I have two sisters"], c: "I have two brothers"},
                    {q: "Welke dag is 'Thursday'?", o: ["Donderdag", "Dinsdag", "Vrijdag"], c: "Donderdag"},
                    {q: "Wat betekent 'What time is it?'", o: ["Hoe laat is het?", "Welke dag is het?", "Waar ga je heen?"], c: "Hoe laat is het?"},
                    {q: "Kies de juiste Engelse kleur voor een sinaasappel:", o: ["Orange", "Red", "Yellow"], c: "Orange"}
                ];
            }
        };

        /**
         * STATE MANAGEMENT
         */
        let appState = {
            points: 0,
            level: 1,
            streak: 0,
            history: [],
            settings: { theme: 'light', rate: 0.85 }
        };

        let currentSession = {
            mode: '',
            level: 'b6',
            questions: [],
            currentIndex: 0,
            score: 0,
            selectedAnswers: []
        };

        // DOM Elements
        const mainDashboard = document.getElementById("dashboard-view");
        const workspaceView = document.getElementById("workspace-view");
        const progressView = document.getElementById("progress-view");
        const settingsView = document.getElementById("settings-view");
        const dynamicContent = document.getElementById("dynamic-content");
        const workspaceFeedback = document.getElementById("workspace-feedback");
        const btnSubmit = document.getElementById("btn-submit-answer");
        const btnNext = document.getElementById("btn-next-question");
        const levelSelector = document.getElementById("level-selector");

        /**
         * APPLICATION LOGIC & BOOTSTRAP
         */
        document.addEventListener("DOMContentLoaded", () => {
            initStorage();
            setupGlobalEvents();
            syncUI();
        });

        function initStorage() {
            const saved = localStorage.getItem("taalapp_master_2026");
            if (saved) {
                try { appState = Object.assign(appState, JSON.parse(saved)); } catch(e) {}
            }
            document.getElementById("theme-select").value = appState.settings.theme;
            document.getElementById("speech-rate").value = appState.settings.rate;
            applyTheme();
        }

        function saveState() {
            localStorage.setItem("taalapp_master_2026", JSON.stringify(appState));
            syncUI();
        }

        function applyTheme() {
            document.documentElement.setAttribute("data-theme", appState.settings.theme);
        }

        function syncUI() {
            document.getElementById("stat-points").innerText = appState.points;
            appState.level = Math.floor(appState.points / 30) + 1;
            document.getElementById("stat-level").innerText = appState.level;
            
            let m = "🥉 Brons";
            if(appState.points > 150) m = "🏆 Meester";
            else if(appState.points > 90) m = "💎 Diamant";
            else if(appState.points > 50) m = "🥇 Goud";
            else if(appState.points > 20) m = "🥈 Zilver";
            document.getElementById("stat-medal").innerText = m;
            document.getElementById("stat-streak").innerText = appState.streak;

            const engelsTile = document.getElementById("engels-tile");
            if(levelSelector.value.includes("7")) {
                engelsTile.style.display = "flex";
            } else {
                engelsTile.style.display = "none";
            }
        }

        function setupGlobalEvents() {
            document.querySelectorAll(".tile").forEach(tile => {
                tile.addEventListener("click", () => {
                    const mode = tile.getAttribute("data-mode");
                    if(mode === "progress") {
                        showSection(progressView);
                        renderHistory();
                    } else if(mode === "settings") {
                        showSection(settingsView);
                    } else {
                        startSession(mode, levelSelector.value);
                    }
                });
            });

            document.querySelectorAll(".entry-back-btn").forEach(btn => {
                btn.addEventListener("click", () => {
                    window.speechSynthesis.cancel();
                    showSection(mainDashboard);
                });
            });

            levelSelector.addEventListener("change", () => {
                syncUI();
            });

            document.getElementById("theme-select").addEventListener("change", (e) => {
                appState.settings.theme = e.target.value;
                applyTheme();
                saveState();
            });
            document.getElementById("speech-rate").addEventListener("change", (e) => {
                appState.settings.rate = parseFloat(e.target.value);
                saveState();
            });
            document.getElementById("btn-hard-reset").addEventListener("click", () => {
                if(confirm("Weet je zeker dat je je score wilt resetten?")) {
                    appState.points = 0;
                    appState.streak = 0;
                    appState.history = [];
                    saveState();
                }
            });

            btnSubmit.addEventListener("click", evaluateAnswer);
            btnNext.addEventListener("click", goToNextQuestion);
        }

        function showSection(section) {
            mainDashboard.style.display = "none";
            workspaceView.style.display = "none";
            progressView.style.display = "none";
            settingsView.style.display = "none";
            section.style.display = "flex";
        }

        function startSession(mode, level) {
            let pool = [];
            if(mode === "spelling") pool = DynamicGenerator.getSpelling(level);
            else if(mode === "dictee") pool = DynamicGenerator.getDictee(level);
            else if(mode === "grammatica") pool = DynamicGenerator.getGrammatica(level);
            else if(mode === "woordenschat") pool = DynamicGenerator.getWoordenschat(level);
            else if(mode === "lezen") pool = DynamicGenerator.getLezen(level);
            else if(mode === "engels") pool = DynamicGenerator.getEngels(level);

            if(pool.length === 0) {
                alert("Geen opdrachten beschikbaar.");
                return;
            }

            // Shuffle pool
            pool.sort(() => 0.5 - Math.random());
            
            // Garandeer ALTIJD exact 15 opdrachten (vul aan met duplicatie indien nodig)
            let finalQuestions = [];
            while(finalQuestions.length < 15) {
                finalQuestions.push(...pool);
            }
            
            currentSession.mode = mode;
            currentSession.level = level;
            currentSession.questions = finalQuestions.slice(0, 15);
            currentSession.currentIndex = 0;
            currentSession.score = 0;

            document.getElementById("workspace-title").innerText = `${mode.toUpperCase()} (15 Vragen)`;
            showSection(workspaceView);
            loadQuestion();
        }

        function loadQuestion() {
            workspaceFeedback.style.display = "none";
            btnSubmit.style.display = "inline-flex";
            btnNext.style.display = "none";
            currentSession.selectedAnswers = [];

            const total = currentSession.questions.length;
            const current = currentSession.currentIndex;
            document.getElementById("workspace-progress").style.width = `${(current / total) * 100}%`;

            if(current >= total) {
                finishSession();
                return;
            }

            const qData = currentSession.questions[current];
            dynamicContent.innerHTML = "";

            if(currentSession.mode === "dictee") {
                dynamicContent.innerHTML = `
                    <div class="exercise-box" style="text-align:center;">
                        <button id="btn-dictee-audio" class="btn btn-warning" style="margin-bottom:15px; font-size:1.2rem;">🔊 Luister naar het woord</button>
                        <p>Typ het woord dat je hoort zorgvuldig over:</p>
                        <input type="text" id="dictee-raw-input" class="input-text" autocomplete="off" placeholder="Jouw antwoord...">
                    </div>
                `;
                
                const playAudio = () => {
                    window.speechSynthesis.cancel();
                    let msg = new SpeechSynthesisUtterance(`Het woord is: ${qData.w}. Ik herhaal: ${qData.z}`);
                    msg.lang = "nl-NL";
                    msg.rate = appState.settings.rate;
                    window.speechSynthesis.speak(msg);
                };

                document.getElementById("btn-dictee-audio").addEventListener("click", playAudio);
                playAudio();

            } else if(currentSession.mode === "grammatica") {
                let woorden = qData.z.split(" ");
                let bubblesHtml = woorden.map((w, idx) => `<button class="word-bubble" data-idx="${idx}">${w}</button>`).join("");
                
                dynamicContent.innerHTML = `
                    <div class="exercise-box">
                        <p style="margin-bottom:15px; font-weight:bold;">${qData.q}</p>
                        <div class="word-bubble-container">${bubblesHtml}</div>
                    </div>
                `;

                document.querySelectorAll(".word-bubble").forEach(bubble => {
                    bubble.addEventListener("click", () => {
                        let idx = bubble.getAttribute("data-idx");
                        if(qData.multi) {
                            bubble.classList.toggle("selected");
                            if(bubble.classList.contains("selected")) {
                                currentSession.selectedAnswers.push(woorden[idx]);
                            } else {
                                currentSession.selectedAnswers = currentSession.selectedAnswers.filter(w => w !== woorden[idx]);
                            }
                        } else {
                            document.querySelectorAll(".word-bubble").forEach(b => b.classList.remove("selected"));
                            bubble.classList.add("selected");
                            currentSession.selectedAnswers = [woorden[idx]];
                        }
                    });
                });

            } else {
                let textContainer = qData.t ? `<div class="exercise-box" style="margin-bottom:15px; text-align:left; background:#fff; border-left:5px solid var(--primary-color);">${qData.t}</div>` : '';
                let optHtml = qData.o.map(o => `<button class="option-btn">${o}</button>`).join("");

                dynamicContent.innerHTML = `
                    ${textContainer}
                    <div class="exercise-box">
                        <p style="margin-bottom:15px; font-weight:bold;">${qData.q}</p>
                        <div class="options-grid">${optHtml}</div>
                    </div>
                `;

                document.querySelectorAll(".option-btn").forEach(btn => {
                    btn.addEventListener("click", () => {
                        document.querySelectorAll(".option-btn").forEach(b => b.classList.remove("selected"));
                        btn.classList.add("selected");
                        currentSession.selectedAnswers = [btn.innerText];
                    });
                });
            }
        }

        function evaluateAnswer() {
            const qData = currentSession.questions[currentSession.currentIndex];
            let isCorrect = false;
            let correctFeedback = "";

            if (currentSession.mode === "dictee") {
                const userVal = document.getElementById("dictee-raw-input").value.trim().toLowerCase();
                isCorrect = (userVal === qData.w.toLowerCase());
                correctFeedback = `Het juiste antwoord is: **${qData.w}**`;
            } else if (currentSession.mode === "grammatica") {
                const cleanAnswers = currentSession.selectedAnswers.map(w => w.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").toLowerCase());
                const cleanCorrect = qData.c.map(w => w.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").toLowerCase());
                
                isCorrect = cleanCorrect.every(w => cleanAnswers.includes(w)) && cleanAnswers.length === cleanCorrect.length;
                correctFeedback = `Juist antwoord: ${qData.c.join(" ")}`;
            } else {
                isCorrect = (currentSession.selectedAnswers[0] === qData.c);
                correctFeedback = qData.u ? qData.u : `Het juiste antwoord is: ${qData.c}`;
            }

            workspaceFeedback.style.display = "block";
            if (isCorrect) {
                workspaceFeedback.style.backgroundColor = "rgba(46, 204, 113, 0.2)";
                workspaceFeedback.style.color = "var(--secondary-color)";
                workspaceFeedback.innerHTML = `🎉 Goed gedaan! ${correctFeedback}`;
                currentSession.score++;
                appState.points += 10;
            } else {
                workspaceFeedback.style.backgroundColor = "rgba(231, 76, 60, 0.2)";
                workspaceFeedback.style.color = "var(--accent-color)";
                workspaceFeedback.innerHTML = `❌ Helaas! ${correctFeedback}`;
            }

            btnSubmit.style.display = "none";
            btnNext.style.display = "inline-flex";
        }

        function goToNextQuestion() {
            currentSession.currentIndex++;
            loadQuestion();
        }

        function finishSession() {
            appState.streak += 1;
            
            const newSessionRecord = {
                date: new Date().toLocaleDateString('nl-NL'),
                mode: currentSession.mode.toUpperCase(),
                level: currentSession.level.toUpperCase(),
                score: `${currentSession.score} / ${currentSession.questions.length}`
            };
            
            appState.history.push(newSessionRecord);
            saveState();

            dynamicContent.innerHTML = `
                <div class="exercise-box" style="text-align:center; padding:40px 20px;">
                    <h2 style="font-size:2rem; margin-bottom:15px;">🏆 Oefening Afgerond!</h2>
                    <p style="font-size:1.2rem; margin-bottom:25px;">
                        Je hebt een score van <strong>${currentSession.score} van de ${currentSession.questions.length}</strong> behaald.<br>
                        Je totale score is nu <strong>${appState.points} punten</strong>.
                    </p>
                    <button class="btn btn-secondary entry-back-btn" onclick="showSection(mainDashboard)">Terug naar Dashboard</button>
                </div>
            `;
            btnSubmit.style.display = "none";
            btnNext.style.display = "none";
        }

        function renderHistory() {
            const tbody = document.getElementById("history-rows");
            tbody.innerHTML = "";
            if(appState.history.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;">Nog geen sessies gemaakt.</td></tr>`;
                return;
            }
            appState.history.forEach(row => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>${row.date}</td>
                    <td>${row.mode}</td>
                    <td>${row.level}</td>
                    <td>${row.score}</td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
